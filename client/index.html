<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBot 设置</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; color: #333; display: flex; height: 100vh; }

/* ===== 主布局 ===== */
.app-container { display: flex; width: 100%; height: 100%; flex-direction: column; }

/* 顶栏 */
.topbar { background: #1e293b; color: #e2e8f0; padding: 0 24px; display: flex; align-items: center; height: 52px; gap: 16px; flex-shrink: 0; }
.topbar-title { font-size: 18px; font-weight: 600; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }

/* 主体 */
.main-body { flex: 1; display: flex; overflow: hidden; }

/* 左侧导航 */
.sidebar { width: 180px; background: #1e293b; display: flex; flex-direction: column; flex-shrink: 0; padding-top: 8px; border-right: 1px solid #334155; }
.sidebar-item { padding: 12px 24px; cursor: pointer; font-size: 14px; color: #94a3b8; transition: all .15s; user-select: none; border-left: 3px solid transparent; }
.sidebar-item:hover { color: #e2e8f0; background: rgba(255,255,255,.04); }
.sidebar-item.active { color: #fff; background: rgba(59,130,246,.12); border-left-color: #3b82f6; font-weight: 500; }

/* 右侧内容区 */
.page-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.page-content.active { display: flex; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* 页面工具栏 */
.page-toolbar { padding: 16px 24px; display: flex; align-items: center; gap: 8px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }

/* ===== 按钮 ===== */
.btn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; display: inline-flex; align-items: center; gap: 4px; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-outline { background: transparent; border: 1px solid #475569; color: #e2e8f0; }
.btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }
.btn-success { background: #22c55e; color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-outline-dark { background: transparent; border: 1px solid #cbd5e1; color: #475569; }
.btn-outline-dark:hover { border-color: #3b82f6; color: #3b82f6; }

/* ===== 表格 ===== */
table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 24px; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
th { background: #f8fafc; font-weight: 600; color: #475569; position: sticky; top: 0; }
td { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
tr:hover td { background: #f8fafc; }
tr.active-row td { background: #eff6ff; }

/* ===== 弹窗 ===== */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 12px; width: 560px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-size: 16px; font-weight: 600; display: flex; align-items: center; }
.modal-header .close { margin-left: auto; cursor: pointer; font-size: 20px; color: #94a3b8; line-height: 1; }
.modal-header .close:hover { color: #333; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 8px; }

/* ===== 表单 ===== */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #475569; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-family: inherit; transition: border .15s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* ===== 卡片 ===== */
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1e293b; display: flex; align-items: center; gap: 8px; }
.card-title .badge { font-size: 11px; background: #dbeafe; color: #2563eb; padding: 2px 8px; border-radius: 10px; font-weight: 500; }

/* ===== 内联表单 ===== */
.inline-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.inline-form .full-width { grid-column: 1 / -1; }

/* ===== 开关 ===== */
.switch-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.switch-row label { font-size: 13px; color: #475569; }
.switch { position: relative; width: 40px; height: 22px; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch .slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e1; border-radius: 22px; transition: .2s; }
.switch .slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
.switch input:checked + .slider { background: #3b82f6; }
.switch input:checked + .slider::before { transform: translateX(18px); }

/* ===== Toast ===== */
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.success { background: #22c55e; }
.toast.error { background: #ef4444; }

/* ===== 历史消息气泡 ===== */
.history-messages { display: flex; flex-direction: column; gap: 12px; }
.msg-row { display: flex; flex-direction: column; gap: 4px; }
.msg-row.human { align-items: flex-end; }
.msg-row.ai { align-items: flex-start; }
.msg-ts { font-size: 11px; color: #94a3b8; }
.msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.msg-bubble .msg-role { font-size: 11px; font-weight: 600; margin-bottom: 4px; opacity: .7; text-transform: uppercase; }
.msg-bubble.human { background: #3b82f6; color: #fff; border-bottom-right-radius: 4px; }
.msg-bubble.ai { background: #fff; color: #333; border: 1px solid #e2e8f0; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
.msg-bubble.ai .msg-role { color: #64748b; }
.msg-bubble.tool { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; border-radius: 8px; font-family: 'Consolas','Monaco',monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
.msg-bubble.tool .msg-role { color: #15803d; opacity: 1; }
.msg-tool-calls { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; font-family: 'Consolas','Monaco',monospace; max-width: 80%; }
.msg-tool-calls .msg-role { font-size: 11px; font-weight: 600; margin-bottom: 8px; color: #b45309; opacity: 1; }
.tool-call-item { margin-bottom: 8px; border: 1px solid #fde68a; border-radius: 6px; overflow: hidden; }
.tool-call-item:last-child { margin-bottom: 0; }
.tool-call-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: rgba(180,83,9,.06); cursor: pointer; user-select: none; }
.tool-call-header::before { content: '\25B6'; font-size: 8px; color: #b45309; transition: transform .15s; display: inline-block; }
.tool-call-header.expanded::before { transform: rotate(90deg); }
.tool-call-name { font-weight: 600; color: #92400e; }
.tool-call-detail { display: none; }
.tool-call-detail.show { display: block; }
.tool-call-args { padding: 8px 10px; background: rgba(180,83,9,.03); border-top: 1px dashed #fde68a; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; }
.tool-call-result { padding: 8px 10px; background: #f0fdf4; color: #166534; border-top: 1px solid #bbf7d0; white-space: pre-wrap; word-break: break-all; max-height: 400px; overflow-y: auto; }
.tool-call-result-label { font-size: 10px; font-weight: 600; color: #15803d; margin-bottom: 2px; text-transform: uppercase; }

/* ===== 聊天输入栏 ===== */
.chat-input-bar { padding: 12px 16px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
.chat-input-bar textarea { flex: 1; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; font-family: inherit; resize: none; min-height: 38px; max-height: 160px; overflow-y: auto; line-height: 1.5; transition: border .15s; }
.chat-input-bar textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
.chat-input-bar textarea:disabled { background: #f8fafc; color: #94a3b8; }
.chat-input-bar .btn-send { padding: 8px 18px; height: 38px; flex-shrink: 0; }
.msg-bubble.streaming { border-color: #93c5fd; }
.msg-bubble.streaming::after { content: '▋'; display: inline-block; animation: blink .8s step-end infinite; margin-left: 2px; }
@keyframes blink { 50% { opacity: 0; } }

/* ===== Plan mode tabs ===== */
.mode-tabs { display: flex; gap: 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 14px; }
.mode-tab { padding: 8px 18px; cursor: pointer; font-size: 13px; color: #64748b; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; user-select: none; }
.mode-tab:hover { color: #3b82f6; }
.mode-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 500; }
.mode-panel { display: none; }
.mode-panel.active { display: block; }
.hint { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }

/* ===== MCP Tools 列表 ===== */
.tools-loading { text-align: center; color: #94a3b8; padding: 40px 0; font-size: 14px; }
.tools-error { text-align: center; color: #ef4444; padding: 40px 20px; font-size: 13px; }
.tools-list { list-style: none; margin: 0; padding: 0; }
.tools-list li { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; }
.tools-list li:last-child { border-bottom: none; }
.tools-list li:hover { background: #f8fafc; }
.tool-name { font-size: 13px; font-weight: 600; color: #1e293b; font-family: 'Consolas','Monaco',monospace; cursor: pointer; user-select: none; }
.tool-name::before { content: '\25B6'; font-size: 9px; margin-right: 6px; color: #94a3b8; display: inline-block; transition: transform .15s; }
.tool-name.expanded::before { transform: rotate(90deg); }
.tool-desc { font-size: 12px; color: #64748b; margin-top: 3px; line-height: 1.5; }
.tools-count { font-size: 12px; color: #94a3b8; font-weight: 400; margin-left: 8px; }
.tool-params { display: none; margin-top: 8px; border-left: 2px solid #e2e8f0; padding-left: 12px; }
.tool-params.show { display: block; }
.tool-param { padding: 5px 0; font-size: 12px; line-height: 1.5; }
.tool-param + .tool-param { border-top: 1px solid #f8fafc; }
.param-name { font-family: 'Consolas','Monaco',monospace; font-weight: 600; color: #1e293b; }
.param-type { color: #8b5cf6; font-size: 11px; margin-left: 4px; }
.param-required { color: #ef4444; font-size: 10px; font-weight: 600; margin-left: 4px; }
.param-desc { color: #64748b; margin-top: 1px; }
.param-enum { color: #0891b2; font-size: 11px; font-family: 'Consolas','Monaco',monospace; }
.param-default { color: #94a3b8; font-size: 11px; }
.tool-no-params { font-size: 12px; color: #94a3b8; font-style: italic; padding: 4px 0; }
.tool-header { display: flex; align-items: center; gap: 8px; }
.tool-header .tool-name { flex: 1; }
.tool-switches { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.tool-switch { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
.tool-switch-label { user-select: none; white-space: nowrap; }
.toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 9px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: #3b82f6; }
.toggle input:checked + .toggle-slider::before { transform: translateX(14px); }
.form-section { margin-top: 16px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
.form-section-title { font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 10px; }
.list-editor { margin-bottom: 14px; }
.list-editor-label { font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.list-editor-items { display: flex; flex-direction: column; gap: 4px; }
.list-editor-row { display: flex; gap: 4px; align-items: center; }
.list-editor-row input { flex: 1; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; }
.list-editor-row button { padding: 4px 8px; font-size: 11px; background: #fee2e2; color: #dc2626; border: none; border-radius: 4px; cursor: pointer; }
.kv-editor { margin-bottom: 14px; }
.kv-editor-label { font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
.kv-editor-items { display: flex; flex-direction: column; gap: 4px; }
.kv-editor-row { display: flex; gap: 4px; align-items: center; }
.kv-editor-row input { flex: 1; padding: 6px 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 12px; }
.kv-editor-row button { padding: 4px 8px; font-size: 11px; background: #fee2e2; color: #dc2626; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div class="app-container">
    <div class="topbar">
        <div class="topbar-title">SBot 设置</div>
        <div class="topbar-actions">
            <button class="btn btn-outline btn-sm" onclick="reloadConfig()">重载配置</button>
        </div>
    </div>
    <div class="main-body">
        <!-- 左侧导航 -->
        <div class="sidebar">
            <div class="sidebar-item active" data-page="page-general">基本设置</div>
            <div class="sidebar-item" data-page="page-agents">Agents</div>
            <div class="sidebar-item" data-page="page-models">模型管理</div>
            <div class="sidebar-item" data-page="page-embeddings">Embedding</div>
            <div class="sidebar-item" data-page="page-memory">记忆设置</div>
            <div class="sidebar-item" data-page="page-mcp">MCP 服务</div>
            <div class="sidebar-item" data-page="page-history">历史记录</div>
            <div class="sidebar-item" data-page="page-user-memory">长期记忆</div>
        </div>

        <!-- ===== 基本设置 ===== -->
        <div class="page-content active" id="page-general">
            <div class="page-toolbar">
                <button class="btn btn-primary btn-sm" onclick="saveGeneralSettings()">保存</button>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-title">Lark 应用</div>
                    <div class="inline-form">
                        <div class="form-group"><label>App ID</label><input type="text" id="larkAppId"></div>
                        <div class="form-group"><label>App Secret</label><input type="password" id="larkAppSecret"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">当前 Agent</div>
                    <div class="form-group"><label>使用的 Agent（在 Agents 页面管理）</label><select id="currentAgent"></select></div>
                </div>
            </div>
        </div>

        <!-- ===== Agents 管理 ===== -->
        <div class="page-content" id="page-agents">
            <div class="page-toolbar">
                <button class="btn btn-outline-dark btn-sm" onclick="loadSettings()">刷新</button>
                <button class="btn btn-primary btn-sm" onclick="showAgentModal()">+ 添加 Agent</button>
            </div>
            <div class="content">
                <table>
                    <thead><tr><th>名称</th><th>类型</th><th>模型</th><th>描述</th><th>操作</th></tr></thead>
                    <tbody id="agentsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 模型管理 ===== -->
        <div class="page-content" id="page-models">
            <div class="page-toolbar">
                <button class="btn btn-outline-dark btn-sm" onclick="loadSettings()">刷新</button>
                <button class="btn btn-primary btn-sm" onclick="showModelModal()">+ 添加模型</button>
            </div>
            <div class="content">
                <table>
                    <thead><tr><th>名称</th><th>Provider</th><th>Base URL</th><th>Model</th><th>操作</th></tr></thead>
                    <tbody id="modelsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== Embedding 管理 ===== -->
        <div class="page-content" id="page-embeddings">
            <div class="page-toolbar">
                <button class="btn btn-outline-dark btn-sm" onclick="loadSettings()">刷新</button>
                <button class="btn btn-primary btn-sm" onclick="showEmbeddingModal()">+ 添加 Embedding</button>
            </div>
            <div class="content">
                <table>
                    <thead><tr><th>名称</th><th>Provider</th><th>Base URL</th><th>Model</th><th>操作</th></tr></thead>
                    <tbody id="embeddingsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 记忆设置 ===== -->
        <div class="page-content" id="page-memory">
            <div class="page-toolbar">
                <button class="btn btn-primary btn-sm" onclick="saveMemorySettings()">保存</button>
            </div>
            <div class="content">
                <div class="card">
                    <div class="card-title">长期记忆</div>
                    <div class="switch-row"><label>启用长期记忆</label><label class="switch"><input type="checkbox" id="memoryEnabled"><span class="slider"></span></label></div>
                    <div class="inline-form" style="margin-top:12px">
                        <div class="form-group"><label>记忆模式</label>
                            <select id="memoryMode">
                                <option value="human_and_ai">human_and_ai（记忆用户与 AI 消息）</option>
                                <option value="human_only">human_only（仅记忆用户消息）</option>
                                <option value="read_only">read_only（只读，不写入新记忆）</option>
                            </select>
                        </div>
                        <div class="form-group"><label>最大保留天数</label><input type="number" id="memoryMaxAgeDays" placeholder="90"></div>
                        <div class="form-group"><label>Embedding 模型</label><select id="memoryEmbedding"></select></div>
                        <div class="form-group"><label>评估器模型</label><select id="memoryEvaluator"><option value="">不使用</option></select></div>
                        <div class="form-group"><label>提取器模型</label><select id="memoryExtractor"><option value="">不使用</option></select></div>
                        <div class="form-group"><label>压缩器模型</label><select id="memoryCompressor"><option value="">不使用</option></select></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== MCP 服务 ===== -->
        <div class="page-content" id="page-mcp">
            <div class="page-toolbar">
                <button class="btn btn-outline-dark btn-sm" onclick="loadMcp()">刷新</button>
                <button class="btn btn-primary btn-sm" onclick="showMcpModal()">+ 添加 MCP</button>
            </div>
            <div class="content">
                <table>
                    <thead><tr><th>名称</th><th>类型</th><th>地址/命令</th><th>操作</th></tr></thead>
                    <tbody id="mcpTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== 历史记录 ===== -->
        <div class="page-content" id="page-history">
            <div class="page-toolbar">
                <select id="historyUserSelect" style="width:220px" onchange="loadHistory()"></select>
                <button class="btn btn-outline-dark btn-sm" onclick="loadHistoryUsers()">刷新</button>
                <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="clearHistory()">清除历史</button>
            </div>
            <div class="content">
                <div id="historyMessages" class="history-messages"></div>
            </div>
            <div class="chat-input-bar">
                <textarea id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行…" rows="1"></textarea>
                <button class="btn btn-primary btn-send" id="chatSendBtn" onclick="sendChatMessage()">发送</button>
            </div>
        </div>

        <!-- ===== 长期记忆 ===== -->
        <div class="page-content" id="page-user-memory">
            <div class="page-toolbar">
                <select id="memoryUserSelect" style="width:220px" onchange="loadUserMemory()"></select>
                <button class="btn btn-outline-dark btn-sm" onclick="loadMemoryUsers()">刷新</button>
                <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="clearAllMemory()">清除全部</button>
            </div>
            <div class="content">
                <table>
                    <thead><tr><th>内容</th><th>重要性</th><th>时间</th><th>标签</th><th>操作</th></tr></thead>
                    <tbody id="userMemoryTableBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- ===== 模型弹窗 ===== -->
<div class="modal-overlay" id="modelModal">
    <div class="modal">
        <div class="modal-header"><span id="modelModalTitle">添加模型</span><span class="close" onclick="closeModelModal()">&times;</span></div>
        <div class="modal-body">

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let settings = {};
let mcpServers = {};

// ===== Toast =====
function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    setTimeout(() => el.className = 'toast', 2500);
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== API =====
async function apiFetch(path, method = 'GET', body = undefined) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '请求失败');
    return data;
}

// ===== 加载数据 =====
async function loadSettings() {
    try {
        const res = await apiFetch('/api/settings');
        settings = res.data || {};
        renderAll();
    } catch (e) { showToast(e.message, 'error'); }
}

async function loadMcp() {
    try {
        const res = await apiFetch('/api/mcp');
        mcpServers = res.data || {};
        renderMcpTable();
    } catch (e) { showToast(e.message, 'error'); }
}

function renderAll() {
    renderGeneralPage();
    renderAgentsTable();
    renderModelsTable();
    renderEmbeddingsTable();
    renderMemoryPage();
}

// ===== 基本设置 =====
function renderGeneralPage() {
    document.getElementById('larkAppId').value = settings.lark?.appId || '';
    document.getElementById('larkAppSecret').value = settings.lark?.appSecret || '';
    // 填充 agent 下拉
    const selAgent = document.getElementById('currentAgent');
    const agents = settings.agents || {};
    selAgent.innerHTML = Object.keys(agents).map(k =>
        '<option value="' + esc(k) + '"' + (k === settings.agent ? ' selected' : '') + '>' + esc(k) + '</option>'
    ).join('');
}

// 已移除旧的 Plan 模式相关代码

async function saveGeneralSettings() {
    try {
        settings.lark = settings.lark || {};
        settings.lark.appId = document.getElementById('larkAppId').value;
        settings.lark.appSecret = document.getElementById('larkAppSecret').value;
        settings.agent = document.getElementById('currentAgent').value;
        await apiFetch('/api/settings', 'PUT', settings);
        showToast('保存成功');
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== 模型管理 =====
let editingModelName = null;

function renderModelsTable() {
    const models = settings.models || {};
    const tbody = document.getElementById('modelsTableBody');
    const entries = Object.entries(models);
    if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:40px">暂无模型</td></tr>';
        return;
    }
    tbody.innerHTML = entries.map(([name, m]) => {
        return '<tr>' +
            '<td>' + esc(name) + '</td>' +
            '<td>' + esc(m.provider) + '</td>' +
            '<td>' + esc(m.baseURL) + '</td>' +
            '<td>' + esc(m.model) + '</td>' +
            '<td>' +
                '<button class="btn btn-outline-dark btn-sm" onclick="editModel(\'' + esc(name) + '\')">编辑</button> ' +
                '<button class="btn btn-danger btn-sm" onclick="deleteModel(\'' + esc(name) + '\')">删除</button>' +
            '</td></tr>';
    }).join('');
}

function showModelModal(name) {
    editingModelName = name || null;
    const m = name ? (settings.models || {})[name] : {};
    document.getElementById('modelModalTitle').textContent = name ? '编辑模型' : '添加模型';
    document.getElementById('modelName').value = name || '';
    document.getElementById('modelProvider').value = m.provider || 'openai';
    document.getElementById('modelBaseURL').value = m.baseURL || '';
    document.getElementById('modelApiKey').value = m.apiKey || '';
    document.getElementById('modelModel').value = m.model || '';
    document.getElementById('modelTemperature').value = m.temperature ?? '';
    document.getElementById('modelModal').classList.add('show');
}
function editModel(name) { showModelModal(name); }
function closeModelModal() { document.getElementById('modelModal').classList.remove('show'); }

async function saveModel() {
    try {
        const name = document.getElementById('modelName').value.trim();
        if (!name) { showToast('名称不能为空', 'error'); return; }
        settings.models = settings.models || {};
        if (editingModelName && editingModelName !== name) {
            delete settings.models[editingModelName];
        }
        const temp = document.getElementById('modelTemperature').value;
        settings.models[name] = {
            provider: document.getElementById('modelProvider').value,
            baseURL: document.getElementById('modelBaseURL').value,
            apiKey: document.getElementById('modelApiKey').value,
            model: document.getElementById('modelModel').value,
        };
        if (temp !== '') settings.models[name].temperature = parseFloat(temp);
        await apiFetch('/api/settings', 'PUT', settings);
        closeModelModal();
        showToast('保存成功');
        renderAll();
    } catch (e) { showToast(e.message, 'error'); }
}

async function deleteModel(name) {
    if (!confirm('确定要删除模型 "' + name + '" 吗？')) return;
    try {
        delete settings.models[name];
        await apiFetch('/api/settings', 'PUT', settings);
        showToast('删除成功');
        renderAll();
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== Embedding 管理 =====
let editingEmbeddingName = null;

function renderEmbeddingsTable() {
    const embeddings = settings.embeddings || {};
    const tbody = document.getElementById('embeddingsTableBody');
    const entries = Object.entries(embeddings);
    if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:40px">暂无 Embedding</td></tr>';
        return;
    }
    tbody.innerHTML = entries.map(([name, m]) =>
        '<tr>' +
        '<td>' + esc(name) + '</td>' +
        '<td>' + esc(m.provider) + '</td>' +
        '<td>' + esc(m.baseURL) + '</td>' +
        '<td>' + esc(m.model) + '</td>' +
        '<td>' +
            '<button class="btn btn-outline-dark btn-sm" onclick="editEmbedding(\'' + esc(name) + '\')">编辑</button> ' +
            '<button class="btn btn-danger btn-sm" onclick="deleteEmbedding(\'' + esc(name) + '\')">删除</button>' +
        '</td></tr>'
    ).join('');
    // 更新记忆页的 embedding 下拉
    renderMemorySelects();
}

function showEmbeddingModal(name) {
    editingEmbeddingName = name || null;
    const m = name ? (settings.embeddings || {})[name] : {};
    document.getElementById('embeddingModalTitle').textContent = name ? '编辑 Embedding' : '添加 Embedding';
    document.getElementById('embeddingName').value = name || '';
    document.getElementById('embeddingProvider').value = m.provider || 'openai';
    document.getElementById('embeddingBaseURL').value = m.baseURL || '';
    document.getElementById('embeddingApiKey').value = m.apiKey || '';
    document.getElementById('embeddingModel').value = m.model || '';
    document.getElementById('embeddingModal').classList.add('show');
}
function editEmbedding(name) { showEmbeddingModal(name); }
function closeEmbeddingModal() { document.getElementById('embeddingModal').classList.remove('show'); }

async function saveEmbedding() {
    try {
        const name = document.getElementById('embeddingName').value.trim();
        if (!name) { showToast('名称不能为空', 'error'); return; }
        settings.embeddings = settings.embeddings || {};
        if (editingEmbeddingName && editingEmbeddingName !== name) {
            delete settings.embeddings[editingEmbeddingName];
        }
        settings.embeddings[name] = {
            provider: document.getElementById('embeddingProvider').value,
            baseURL: document.getElementById('embeddingBaseURL').value,
            apiKey: document.getElementById('embeddingApiKey').value,
            model: document.getElementById('embeddingModel').value,
        };
        await apiFetch('/api/settings', 'PUT', settings);
        closeEmbeddingModal();
        showToast('保存成功');
        renderAll();
    } catch (e) { showToast(e.message, 'error'); }
}

async function deleteEmbedding(name) {
    if (!confirm('确定要删除 Embedding "' + name + '" 吗？')) return;
    try {
        delete settings.embeddings[name];
        await apiFetch('/api/settings', 'PUT', settings);
        showToast('删除成功');
        renderAll();
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== 记忆设置 =====
function renderMemoryPage() {
    const mem = settings.memory || {};
    document.getElementById('memoryEnabled').checked = !!mem.enabled;
    document.getElementById('memoryMode').value = mem.mode || 'human_and_ai';
    document.getElementById('memoryMaxAgeDays').value = mem.maxAgeDays ?? 90;
    renderMemorySelects();
}

function renderMemorySelects() {
    const mem = settings.memory || {};
    const models = Object.keys(settings.models || {});
    const embeddings = Object.keys(settings.embeddings || {});

    fillSelect('memoryEmbedding', embeddings, mem.embedding, false);
    fillSelect('memoryEvaluator', models, mem.evaluator, true);
    fillSelect('memoryExtractor', models, mem.extractor, true);
    fillSelect('memoryCompressor', models, mem.compressor, true);
}

function fillSelect(id, options, current, allowEmpty) {
    const sel = document.getElementById(id);
    let html = allowEmpty ? '<option value="">不使用</option>' : '';
    html += options.map(o => '<option value="' + esc(o) + '"' + (o === current ? ' selected' : '') + '>' + esc(o) + '</option>').join('');
    sel.innerHTML = html;
}

async function saveMemorySettings() {
    try {
        settings.memory = settings.memory || {};
        settings.memory.enabled = document.getElementById('memoryEnabled').checked;
        settings.memory.mode = document.getElementById('memoryMode').value || undefined;
        settings.memory.maxAgeDays = parseInt(document.getElementById('memoryMaxAgeDays').value) || 90;
        settings.memory.embedding = document.getElementById('memoryEmbedding').value || undefined;
        settings.memory.evaluator = document.getElementById('memoryEvaluator').value || undefined;
        settings.memory.extractor = document.getElementById('memoryExtractor').value || undefined;
        settings.memory.compressor = document.getElementById('memoryCompressor').value || undefined;
        await apiFetch('/api/settings', 'PUT', settings);
        showToast('保存成功');
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== MCP 管理 =====
let editingMcpName = null;
let viewingMcpName = null;

function renderMcpTable() {
    const tbody = document.getElementById('mcpTableBody');
    const entries = Object.entries(mcpServers);
    if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:40px">暂无 MCP 服务</td></tr>';
        return;
    }
    tbody.innerHTML = entries.map(([name, cfg]) => {
        const type = cfg.url ? 'http' : (cfg.command ? 'stdio' : cfg.type || '-');
        const addr = cfg.url || (cfg.command ? [cfg.command, ...(cfg.args || [])].join(' ') : '-');
        return '<tr>' +
            '<td>' + esc(name) + '</td>' +
            '<td>' + esc(type) + '</td>' +
            '<td>' + esc(addr) + '</td>' +
            '<td>' +
                '<button class="btn btn-outline-dark btn-sm" onclick="viewMcpTools(\'' + esc(name) + '\')">查看</button> ' +
                '<button class="btn btn-outline-dark btn-sm" onclick="editMcp(\'' + esc(name) + '\')">编辑</button> ' +
                '<button class="btn btn-danger btn-sm" onclick="deleteMcp(\'' + esc(name) + '\')">删除</button>' +
            '</td></tr>';
    }).join('');
}

// ===== List Editor =====
function renderListEditor(containerId, label, items, placeholder) {
    const c = document.getElementById(containerId);
    let html = '<div class="list-editor"><div class="list-editor-label"><span>' + esc(label) + '</span>' +
        '<button class="btn btn-outline-dark btn-sm" onclick="listEditorAdd(\'' + containerId + '\',\'' + esc(placeholder) + '\')">+</button></div>' +
        '<div class="list-editor-items" id="' + containerId + '_items">';
    (items || []).forEach((v, i) => {
        html += '<div class="list-editor-row"><input type="text" value="' + esc(v) + '" placeholder="' + esc(placeholder) + '">' +
            '<button onclick="this.parentElement.remove()">x</button></div>';
    });
    html += '</div></div>';
    c.innerHTML = html;
}
function listEditorAdd(containerId, placeholder) {
    const items = document.getElementById(containerId + '_items');
    const row = document.createElement('div');
    row.className = 'list-editor-row';
    row.innerHTML = '<input type="text" placeholder="' + esc(placeholder) + '"><button onclick="this.parentElement.remove()">x</button>';
    items.appendChild(row);
}
function listEditorGetValues(containerId) {
    const items = document.getElementById(containerId + '_items');
    if (!items) return [];
    return Array.from(items.querySelectorAll('input')).map(i => i.value.trim()).filter(Boolean);
}

// ===== KV Editor =====
function renderKvEditor(containerId, label, obj, keyPh, valPh) {
    const c = document.getElementById(containerId);
    let html = '<div class="kv-editor"><div class="kv-editor-label"><span>' + esc(label) + '</span>' +
        '<button class="btn btn-outline-dark btn-sm" onclick="kvEditorAdd(\'' + containerId + '\',\'' + esc(keyPh) + '\',\'' + esc(valPh) + '\')">+</button></div>' +
        '<div class="kv-editor-items" id="' + containerId + '_items">';
    Object.entries(obj || {}).forEach(([k, v]) => {
        html += '<div class="kv-editor-row"><input type="text" value="' + esc(k) + '" placeholder="' + esc(keyPh) + '">' +
            '<input type="text" value="' + esc(String(v)) + '" placeholder="' + esc(valPh) + '">' +
            '<button onclick="this.parentElement.remove()">x</button></div>';
    });
    html += '</div></div>';
    c.innerHTML = html;
}
function kvEditorAdd(containerId, keyPh, valPh) {
    const items = document.getElementById(containerId + '_items');
    const row = document.createElement('div');
    row.className = 'kv-editor-row';
    row.innerHTML = '<input type="text" placeholder="' + esc(keyPh) + '"><input type="text" placeholder="' + esc(valPh) + '"><button onclick="this.parentElement.remove()">x</button>';
    items.appendChild(row);
}
function kvEditorGetValues(containerId) {
    const items = document.getElementById(containerId + '_items');
    if (!items) return {};
    const result = {};
    items.querySelectorAll('.kv-editor-row').forEach(row => {
        const inputs = row.querySelectorAll('input');
        const k = inputs[0].value.trim();
        const v = inputs[1].value.trim();
        if (k) result[k] = v;
    });
    return result;
}

// ===== MCP Modal =====
function onMcpTypeChange() {
    const isStdio = document.getElementById('mcpType').value === 'stdio';
    document.getElementById('mcpFieldsHttp').style.display = isStdio ? 'none' : '';
    document.getElementById('mcpFieldsStdio').style.display = isStdio ? '' : 'none';
}

function showMcpModal(name) {
    editingMcpName = name || null;
    document.getElementById('mcpModalTitle').textContent = name ? '编辑 MCP 服务' : '添加 MCP 服务';
    document.getElementById('mcpName').value = name || '';

async function saveMcp() {
    try {
        const name = document.getElementById('mcpName').value.trim();
        if (!name) { showToast('名称不能为空', 'error'); return; }

        const type = document.getElementById('mcpType').value;
        const cfg = {};

        if (type === 'stdio') {
            const command = document.getElementById('mcpCommand').value.trim();
            if (!command) { showToast('Command 不能为空', 'error'); return; }
            cfg.command = command;
            cfg.args = listEditorGetValues('mcpArgsEditor');
            const env = kvEditorGetValues('mcpEnvEditor');
            if (Object.keys(env).length > 0) cfg.env = env;
            const cwd = document.getElementById('mcpCwd').value.trim();
            if (cwd) cfg.cwd = cwd;
        } else {
            const url = document.getElementById('mcpUrl').value.trim();
            if (!url) { showToast('URL 不能为空', 'error'); return; }
            cfg.type = 'http';
            cfg.url = url;
            const headers = kvEditorGetValues('mcpHeadersEditor');
            if (Object.keys(headers).length > 0) cfg.headers = headers;
        }

        // Common
        const timeout = document.getElementById('mcpToolTimeout').value.trim();
        if (timeout) cfg.defaultToolTimeout = parseInt(timeout);
        const disabled = listEditorGetValues('mcpDisabledEditor');
        if (disabled.length > 0) cfg.disabled = disabled;
        const disabledAuto = listEditorGetValues('mcpDisabledAutoApproveEditor');
        if (disabledAuto.length > 0) cfg.disabledAutoApproveTools = disabledAuto;

        // 如果名称变更，删除旧条目
        if (editingMcpName && editingMcpName !== name) {
            delete mcpServers[editingMcpName];
        }
        mcpServers[name] = cfg;
        await apiFetch('/api/mcp', 'PUT', mcpServers);
        closeMcpModal();
        showToast('保存成功');
        renderMcpTable();
    } catch (e) { showToast(e.message, 'error'); }
}

async function toggleToolDisabled(toolName, enabled) {
    const cfg = mcpServers[viewingMcpName];
    if (!cfg) return;
    if (!Array.isArray(cfg.disabled)) cfg.disabled = [];
    if (enabled) {
        cfg.disabled = cfg.disabled.filter(n => n !== toolName);
    } else {
        if (!cfg.disabled.includes(toolName)) cfg.disabled.push(toolName);
    }
    if (cfg.disabled.length === 0) delete cfg.disabled;
    await apiFetch('/api/mcp', 'PUT', mcpServers);
}

async function toggleToolAutoApprove(toolName, autoApprove) {
    const cfg = mcpServers[viewingMcpName];
    if (!cfg) return;
    if (!Array.isArray(cfg.disabledAutoApproveTools)) cfg.disabledAutoApproveTools = [];
    if (autoApprove) {
        cfg.disabledAutoApproveTools = cfg.disabledAutoApproveTools.filter(n => n !== toolName);
    } else {
        if (!cfg.disabledAutoApproveTools.includes(toolName)) cfg.disabledAutoApproveTools.push(toolName);
    }
    if (cfg.disabledAutoApproveTools.length === 0) delete cfg.disabledAutoApproveTools;
    await apiFetch('/api/mcp', 'PUT', mcpServers);
}

function toggleToolParams(el) {
    el.classList.toggle('expanded');
    const li = el.closest('li');
    const params = li ? li.querySelector('.tool-params') : null;
    if (params) params.classList.toggle('show');
}

function renderToolParams(schema) {
    if (!schema || !schema.properties || Object.keys(schema.properties).length === 0) {
        return '<div class="tool-no-params">无参数</div>';
    }
    const required = new Set(schema.required || []);
    return Object.entries(schema.properties).map(([name, prop]) => {
        let html = '<div class="tool-param">';
        html += '<div><span class="param-name">' + esc(name) + '</span>';
        html += '<span class="param-type">' + esc(formatParamType(prop)) + '</span>';
        if (required.has(name)) html += '<span class="param-required">*必填</span>';
        html += '</div>';
        if (prop.description) html += '<div class="param-desc">' + esc(prop.description) + '</div>';
        if (prop.enum) html += '<div class="param-enum">可选值: ' + prop.enum.map(v => esc(String(v))).join(' | ') + '</div>';
        if (prop.default !== undefined) html += '<div class="param-default">默认值: ' + esc(String(prop.default)) + '</div>';
        if (prop.type === 'object' && prop.properties) {
            html += '<div style="margin-left:12px;margin-top:4px;border-left:2px solid #f1f5f9;padding-left:10px">' + renderToolParams(prop) + '</div>';
        }
        if (prop.type === 'array' && prop.items) {
            html += '<div class="param-desc">元素类型: ' + esc(formatParamType(prop.items)) + '</div>';
            if (prop.items.type === 'object' && prop.items.properties) {
                html += '<div style="margin-left:12px;margin-top:4px;border-left:2px solid #f1f5f9;padding-left:10px">' + renderToolParams(prop.items) + '</div>';
            }
        }
        html += '</div>';
        return html;
    }).join('');
}

function formatParamType(prop) {
    if (!prop) return 'any';
    if (prop.type === 'array') {
        if (prop.items) return formatParamType(prop.items) + '[]';
        return 'array';
    }
    if (prop.type) return prop.type;
    if (prop.anyOf) return prop.anyOf.map(s => s.type || 'any').join(' | ');
    if (prop.oneOf) return prop.oneOf.map(s => s.type || 'any').join(' | ');
    return 'any';
}

async function saveAgent() {
    try {
        const name = document.getElementById('agentName').value.trim();
        const type = document.getElementById('agentType').value;
        if (!name) { showToast('名称不能为空', 'error'); return; }

        let agentConfig = { type };

        if (type === 'single') {
            const model = document.getElementById('agentModelSingle').value.trim();
            const systemPrompt = document.getElementById('agentSystemPromptSingle').value.trim();
            if (model) agentConfig.model = model;
            if (systemPrompt) agentConfig.systemPrompt = systemPrompt;
        } else if (type === 'supervisor') {
            const model = document.getElementById('agentModelSupervisor').value.trim();
            const systemPrompt = document.getElementById('agentSystemPromptSupervisor').value.trim();
            if (model) agentConfig.model = model;
            if (systemPrompt) agentConfig.systemPrompt = systemPrompt;
            agentConfig.agents = tempSubAgents;
        } else if (type === 'react') {
            const maxIterations = parseInt(document.getElementById('agentMaxIterations').value) || 5;
            agentConfig.maxIterations = maxIterations;

            const thinkModel = document.getElementById('agentThinkModel').value.trim();
            const thinkPrompt = document.getElementById('agentThinkPrompt').value.trim();
            if (thinkModel || thinkPrompt) {
                agentConfig.think = {};
                if (thinkModel) agentConfig.think.model = thinkModel;
                if (thinkPrompt) agentConfig.think.systemPrompt = thinkPrompt;
            }

            const reflectModel = document.getElementById('agentReflectModel').value.trim();
            const reflectPrompt = document.getElementById('agentReflectPrompt').value.trim();
            if (reflectModel || reflectPrompt) {
                agentConfig.reflect = {};
                if (reflectModel) agentConfig.reflect.model = reflectModel;
                if (reflectPrompt) agentConfig.reflect.systemPrompt = reflectPrompt;
            }

            agentConfig.agents = tempSubAgents;
        }

        showToast('保存成功');
        renderAgentsTable();

}

        renderHistoryMessages(res.data || []);
    } catch (e) { showToast(e.message, 'error'); }

function renderHistoryMessages(messages) {
    const container = document.getElementById('historyMessages');
    if (messages.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:60px">暂无历史记录</div>';
        return;
    }
    // 建立 tool_call_id → tool message 映射
    const toolResultMap = {};
    for (const m of messages) {
        if (m.role === 'tool' && m.tool_call_id) {
            toolResultMap[m.tool_call_id] = m;
        }
    }
    const parts = [];
    for (const m of messages) {
        // tool 消息内嵌在对应 AI 消息的 tool_call 里，不单独渲染
        if (m.role === 'tool' && m.tool_call_id) continue;
        parts.push(renderOneMessage(m, toolResultMap));
    }
    container.innerHTML = parts.join('');
    container.scrollTop = container.scrollHeight;
}

function fmtTs(ts) {
    if (!ts) return '';
    try { return new Date(ts).toLocaleString(); } catch { return ''; }
}

function renderOneMessage(m, toolResultMap) {
    const role = m.role || 'unknown';
    const ts = m.timestamp ? '<div class="msg-ts">' + esc(fmtTs(m.timestamp)) + '</div>' : '';
    if (role === 'human') {
        return '<div class="msg-row human">' + ts +
            '<div class="msg-bubble human"><div class="msg-role">用户</div>' + esc(m.content) + '</div>' +
            '</div>';
    }
    if (role === 'ai') {
        let inner = '';
        if (m.content) {
            inner += '<div class="msg-bubble ai"><div class="msg-role">AI</div>' + esc(m.content) + '</div>';
        }
        if (m.tool_calls && m.tool_calls.length > 0) {
            const callsHtml = m.tool_calls.map(tc => {
                const result = toolResultMap[tc.id];
                let item = '<div class="tool-call-item">' +
                    '<div class="tool-call-header" onclick="toggleToolCall(this)">' +
                    '<span class="tool-call-name">' + esc(tc.name) + '</span></div>' +
                    '<div class="tool-call-detail">' +
                    '<div class="tool-call-args">' + esc(JSON.stringify(tc.args, null, 2)) + '</div>';
                if (result) {
                    item += '<div class="tool-call-result">' +
                        '<div class="tool-call-result-label">返回结果</div>' +
                        esc(result.content) + '</div>';
                }
                item += '</div></div>';
                return item;
            }).join('');
            inner += '<div class="msg-tool-calls"><div class="msg-role">Tool Calls (' + m.tool_calls.length + ')</div>' + callsHtml + '</div>';
        }
        return '<div class="msg-row ai">' + ts + inner + '</div>';
    }
    if (role === 'tool') {
        const name = m.name ? ' · ' + m.name : '';
        return '<div class="msg-row ai">' +
            '<div class="msg-bubble tool"><div class="msg-role">Tool' + esc(name) + '</div>' + esc(m.content) + '</div>' +
            '</div>';
    }
    // system / unknown
    return '<div class="msg-row ai">' + ts +
        '<div class="msg-bubble ai"><div class="msg-role">' + esc(role) + '</div>' + esc(m.content) + '</div>' +
        '</div>';
}

function toggleToolCall(header) {
    header.classList.toggle('expanded');
    header.nextElementSibling.classList.toggle('show');
}

async function clearHistory() {
    const userId = document.getElementById('historyUserSelect').value;
    if (!userId || !confirm('确定要清除 ' + userId + ' 的所有历史记录吗？')) return;
    try {
        await apiFetch('/api/users/' + encodeURIComponent(userId) + '/history', 'DELETE');
        showToast('历史已清除');
        renderHistoryMessages([]);
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== 聊天输入 =====
(function () {
    // Enter 发送，Shift+Enter 换行，自动高度
    document.addEventListener('DOMContentLoaded', () => {
        const ta = document.getElementById('chatInput');
        if (!ta) return;
        ta.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });
        ta.addEventListener('input', () => {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
        });
    });
})();

let _chatSending = false;

async function sendChatMessage() {
    if (_chatSending) return;
    const userId = document.getElementById('historyUserSelect').value;
    const ta = document.getElementById('chatInput');
    const btn = document.getElementById('chatSendBtn');
    const query = ta.value.trim();
    if (!userId || !query) return;

    _chatSending = true;
    ta.disabled = true;
    btn.disabled = true;

    ta.value = '';
    ta.style.height = 'auto';

    // 立即显示用户消息
    const container = document.getElementById('historyMessages');
    const userRow = document.createElement('div');
    userRow.className = 'msg-row human';
    userRow.innerHTML = '<div class="msg-ts">' + esc(fmtTs(new Date().toISOString())) + '</div>' +
        '<div class="msg-bubble human"><div class="msg-role">用户</div>' + esc(query) + '</div>';
    container.appendChild(userRow);

    // AI 占位气泡（流式更新）
    const aiRow = document.createElement('div');
    aiRow.className = 'msg-row ai';
    const aiBubble = document.createElement('div');
    aiBubble.className = 'msg-bubble ai streaming';
    aiBubble.innerHTML = '<div class="msg-role">AI</div><span style="color:#94a3b8">队列中…</span>';
    aiRow.appendChild(aiBubble);
    container.appendChild(aiRow);
    container.scrollTop = container.scrollHeight;

    let streamContent = '';

    try {
        const response = await fetch(API + '/api/users/' + encodeURIComponent(userId) + '/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query }),
        });
        if (!response.ok) throw new Error('请求失败: ' + response.status);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                let evt;
                try { evt = JSON.parse(line.slice(6)); } catch { continue; }
                if (evt.type === 'stream') {
                    streamContent = evt.content;
                    aiBubble.innerHTML = '<div class="msg-role">AI</div>' + esc(streamContent).replace(/\n/g, '<br>');
                    container.scrollTop = container.scrollHeight;
                } else if (evt.type === 'tool_call') {
                    const toolTag = document.createElement('div');
                    toolTag.className = 'msg-tool-calls';
                    toolTag.innerHTML = '<div class="msg-role">Tool Call</div>' +
                        '<div class="tool-call-item"><div class="tool-call-header expanded" onclick="toggleToolCall(this)">' +
                        '<span class="tool-call-name">' + esc(evt.name) + '</span></div>' +
                        '<div class="tool-call-detail show"><div class="tool-call-args">' +
                        esc(JSON.stringify(evt.args, null, 2)) + '</div></div></div>';
                    aiRow.appendChild(toolTag);
                    container.scrollTop = container.scrollHeight;
                } else if (evt.type === 'done') {
                    aiBubble.classList.remove('streaming');
                    // 刷新完整历史（含时间戳）
                    await loadHistory();
                } else if (evt.type === 'error') {
                    aiBubble.classList.remove('streaming');
                    aiBubble.innerHTML += '<br><span style="color:#ef4444">错误: ' + esc(evt.message) + '</span>';
                }
            }
        }
    } catch (e) {
        aiBubble.classList.remove('streaming');
        aiBubble.innerHTML += '<br><span style="color:#ef4444">错误: ' + esc(e.message) + '</span>';
    } finally {
        _chatSending = false;
        ta.disabled = false;
        btn.disabled = false;
        ta.focus();
    }
}

// ===== 长期记忆管理 =====
async function loadMemoryUsers() {
    try {
        const res = await apiFetch('/api/users');
        const users = res.data || [];
        const sel = document.getElementById('memoryUserSelect');
        sel.innerHTML = users.length === 0
            ? '<option value="">暂无用户</option>'
            : users.map(u => '<option value="' + esc(u) + '">' + esc(u) + '</option>').join('');
        if (users.length > 0) await loadUserMemory();
    } catch (e) { showToast(e.message, 'error'); }
}

async function loadUserMemory() {
    const userId = document.getElementById('memoryUserSelect').value;
    if (!userId) return;
    try {
        const res = await apiFetch('/api/users/' + encodeURIComponent(userId) + '/memory');
        renderMemoryTable(userId, res.data || []);
    } catch (e) { showToast(e.message, 'error'); }
}

function renderMemoryTable(userId, memories) {
    const tbody = document.getElementById('userMemoryTableBody');
    if (memories.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:40px">暂无记忆</td></tr>';
        return;
    }
    tbody.innerHTML = memories.map(m => {
        const date = m.timestamp ? new Date(m.timestamp).toLocaleString() : '-';
        const tags = (m.tags || []).join(', ');
        return '<tr>' +
            '<td style="max-width:420px;white-space:normal;word-break:break-word">' + esc(m.content) + '</td>' +
            '<td>' + (m.importance != null ? m.importance.toFixed(2) : '-') + '</td>' +
            '<td style="white-space:nowrap">' + esc(date) + '</td>' +
            '<td>' + esc(tags) + '</td>' +
            '<td><button class="btn btn-danger btn-sm" onclick="deleteMemory(\'' + esc(userId) + '\',\'' + esc(m.id) + '\')">删除</button></td>' +
            '</tr>';
    }).join('');
}

async function deleteMemory(userId, memoryId) {
    try {
        await apiFetch('/api/users/' + encodeURIComponent(userId) + '/memory/' + encodeURIComponent(memoryId), 'DELETE');
        showToast('删除成功');
        await loadUserMemory();
    } catch (e) { showToast(e.message, 'error'); }
}

async function clearAllMemory() {
    const userId = document.getElementById('memoryUserSelect').value;
    if (!userId || !confirm('确定要清除 ' + userId + ' 的所有记忆吗？')) return;
    try {
        await apiFetch('/api/users/' + encodeURIComponent(userId) + '/memory', 'DELETE');
        showToast('已清除所有记忆');
        renderMemoryTable(userId, []);
    } catch (e) { showToast(e.message, 'error'); }
}

// ===== 导航切换 =====
document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
    el.addEventListener('click', () => {
        const target = el.dataset.page;
        document.querySelectorAll('.sidebar-item[data-page]').forEach(t => t.classList.toggle('active', t === el));
        document.querySelectorAll('.page-content').forEach(p => p.classList.toggle('active', p.id === target));
        if (target === 'page-mcp') loadMcp();
        if (target === 'page-history') loadHistoryUsers();
        if (target === 'page-user-memory') loadMemoryUsers();
    });
});

// ===== 初始化 =====
(async function init() {
    await loadSettings();
    await loadMcp();
})();
</script>
