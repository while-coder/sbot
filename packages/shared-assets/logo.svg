<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#312e81" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Antenna -->
  <line x1="256" y1="76" x2="256" y2="118" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="66" r="14" fill="#fff"/>

  <!-- Head - centered -->
  <rect x="108" y="118" width="296" height="276" rx="56" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Ear left -->
  <rect x="68" y="208" width="44" height="104" rx="22" fill="url(#face)" filter="url(#shadow)"/>
  <rect x="78" y="224" width="24" height="72" rx="12" fill="#6366f1" opacity="0.35"/>

  <!-- Ear right -->
  <rect x="400" y="208" width="44" height="104" rx="22" fill="url(#face)" filter="url(#shadow)"/>
  <rect x="410" y="224" width="24" height="72" rx="12" fill="#06b6d4" opacity="0.35"/>

  <!-- Eye left -->
  <rect x="160" y="208" width="80" height="64" rx="20" fill="#4338ca"/>
  <rect x="184" y="220" width="20" height="32" rx="8" fill="#fff" opacity="0.9"/>

  <!-- Eye right -->
  <rect x="272" y="208" width="80" height="64" rx="20" fill="#0891b2"/>
  <rect x="296" y="220" width="20" height="32" rx="8" fill="#fff" opacity="0.9"/>

  <!-- Mouth - neutral/slight smile -->
  <path d="M208 340 Q256 368, 304 340"
        fill="none" stroke="#4338ca" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
</svg>
