<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a"/>
      <stop offset="100%" stop-color="#1e1e3a"/>
    </linearGradient>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Antenna -->
  <line x1="256" y1="72" x2="256" y2="120" stroke="url(#glow)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="64" r="14" fill="url(#glow)"/>

  <!-- Head -->
  <rect x="108" y="120" width="296" height="240" rx="48" fill="url(#face)" filter="url(#shadow)"/>

  <!-- Ear left -->
  <rect x="72" y="192" width="36" height="96" rx="18" fill="url(#face)" filter="url(#shadow)"/>
  <rect x="76" y="204" width="28" height="72" rx="14" fill="url(#glow)" opacity="0.3"/>

  <!-- Ear right -->
  <rect x="404" y="192" width="36" height="96" rx="18" fill="url(#face)" filter="url(#shadow)"/>
  <rect x="408" y="204" width="28" height="72" rx="14" fill="url(#glow)" opacity="0.3"/>

  <!-- Eye left -->
  <rect x="164" y="192" width="72" height="56" rx="16" fill="#0d0d1a"/>
  <rect x="172" y="200" width="56" height="40" rx="12" fill="#7b68ee" filter="url(#eyeGlow)"/>
  <rect x="180" y="208" width="16" height="24" rx="6" fill="#fff" opacity="0.8"/>

  <!-- Eye right -->
  <rect x="276" y="192" width="72" height="56" rx="16" fill="#0d0d1a"/>
  <rect x="284" y="200" width="56" height="40" rx="12" fill="#4fc3f7" filter="url(#eyeGlow)"/>
  <rect x="292" y="208" width="16" height="24" rx="6" fill="#fff" opacity="0.8"/>

  <!-- Mouth - stylized S shape -->
  <path d="M208 296 Q208 280, 232 280 L280 280 Q304 280, 304 296 Q304 312, 280 312 L232 312 Q208 312, 208 328 Q208 344, 232 344 L280 344 Q304 344, 304 328"
        fill="none" stroke="url(#glow)" stroke-width="10" stroke-linecap="round"/>

  <!-- SBOT text -->
  <text x="256" y="440" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="800" letter-spacing="12" fill="url(#glow)" text-anchor="middle">SBOT</text>
</svg>
